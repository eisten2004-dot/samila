<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meeting with an Old Friend · Interactive Class · A2–B1</title>
<style>
:root{
  --bg:#eef1fb;--bg2:#e4e8fa;--card:#ffffff;--ink:#1f2547;--muted:#6b7090;
  --brand:#5b5bf6;--brand2:#7c4dff;--accent:#ff8a3d;--green:#22c55e;--red:#ef4444;
  --gold:#fbbf24;--border:#e7e8f5;--soft:#f6f7ff;--radius:22px;
  --id:#7c4dff;--idbg:#f1ecff;--pv:#0ea5a3;--pvbg:#e6fbfa;
  --shadow:0 10px 30px rgba(20,18,80,.10),0 2px 6px rgba(20,18,80,.06);
}
html[data-theme="dark"]{
  --bg:#0d1024;--bg2:#161a3a;--card:#1b1f44;--ink:#eaecff;--muted:#a6abd6;
  --border:#2c3266;--soft:#222863;--idbg:#2a2358;--pvbg:#10353a;
  --shadow:0 12px 34px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;color:var(--ink);background:linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh;
  font:17px/1.6 "Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}

/* ---------- TOP BAR ---------- */
.top{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:11px 20px;background:rgba(20,22,52,.92);backdrop-filter:blur(10px);color:#fff}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px}
.logo .mk{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-size:20px}
.top .sp{flex:1}
.hud{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.13);border-radius:999px;padding:7px 13px;font-weight:700;font-size:15px}
.hud.gold{color:var(--gold)}
.tg{cursor:pointer;border:0;font:inherit;font-weight:700;color:#fff;background:rgba(255,255,255,.13);border-radius:999px;padding:8px 14px}
.tg:hover{background:rgba(255,255,255,.24)}
.bar{height:9px;background:rgba(255,255,255,.16);border-radius:999px;overflow:hidden;flex-basis:100%;margin-top:4px}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:999px;transition:width .5s ease}

/* ---------- TABS ---------- */
.tabs{position:sticky;top:55px;z-index:55;display:flex;gap:8px;overflow-x:auto;padding:12px 16px;
  background:linear-gradient(180deg,rgba(20,22,52,.0),rgba(20,22,52,0));scrollbar-width:thin}
.tab{white-space:nowrap;cursor:pointer;border:2px solid transparent;font:inherit;font-weight:800;font-size:15px;
  color:var(--ink);background:var(--card);border-radius:999px;padding:10px 18px;box-shadow:var(--shadow);transition:.15s}
.tab:hover{transform:translateY(-2px)}
.tab.on{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent}

/* ---------- LAYOUT ---------- */
.wrap{max-width:1020px;margin:0 auto;padding:20px 16px 110px}
.view{display:none;animation:pop .4s ease}
.view.on{display:block}
@keyframes pop{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.slide{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px;margin:0 0 22px}
.tag{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  color:var(--brand);background:var(--idbg);padding:5px 12px;border-radius:999px;margin-bottom:10px}
h1{font-size:34px;line-height:1.15;margin:.1em 0 .3em}
h2{font-size:27px;margin:.1em 0 .35em}
h3{font-size:21px;margin:.2em 0 .3em}
p.lead{font-size:19px;color:var(--muted);margin:.2em 0 1em}
.muted{color:var(--muted)}
.center{text-align:center}

/* ---------- GHIBLI IMAGE FRAMES ---------- */
.scene{display:grid;grid-template-columns:1fr;gap:0;margin:18px 0;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.scene .art{position:relative;aspect-ratio:16/9;display:grid;place-items:center;text-align:center;color:#fff;padding:22px;
  background:linear-gradient(135deg,#6d8bd0,#9bc1bc 55%,#f3d9a4);overflow:hidden}
.scene .art::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.35),transparent 45%),radial-gradient(circle at 80% 80%,rgba(255,255,255,.18),transparent 40%)}
.scene .art .em{font-size:60px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25));position:relative;z-index:1}
.scene .art .lbl{position:absolute;top:12px;left:12px;background:rgba(15,18,38,.55);color:#fff;font-size:12px;font-weight:800;letter-spacing:.5px;padding:5px 11px;border-radius:999px;z-index:1}
.scene .art .ghb{position:absolute;bottom:12px;right:12px;background:rgba(15,18,38,.55);color:#fff;font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;z-index:1}
.scene .meta{background:var(--soft);padding:14px 16px}
.scene .meta .prm{font-size:14px;color:var(--muted);margin:0 0 8px}
.scene .meta .prm b{color:var(--pv)}
.scene .meta .obs{font-size:16px;font-weight:700;margin:0;display:flex;gap:8px;align-items:flex-start}
.scene .meta .obs::before{content:"👁";flex:0 0 auto}

/* ---------- STORY TEXT ---------- */
.story{font-size:18.5px;line-height:1.75}
.story p{margin:0 0 14px}
.id{font-weight:800;color:var(--id);background:var(--idbg);padding:1px 7px;border-radius:7px;white-space:nowrap}
.pv{font-weight:800;color:var(--pv);background:var(--pvbg);padding:1px 7px;border-radius:7px;white-space:nowrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:14px;font-weight:700;margin:0 0 12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.dot{width:13px;height:13px;border-radius:4px;display:inline-block}

/* ---------- WORD CHIPS / VOCAB ---------- */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin:8px 0 4px}
.vcard{border:2px solid var(--border);border-radius:16px;padding:14px;background:var(--soft);text-align:center;transition:.15s;cursor:default}
.vcard:hover{transform:translateY(-3px);border-color:var(--brand)}
.vcard .em{font-size:34px}
.vcard .w{font-weight:800;font-size:18px;margin-top:4px}
.vcard .pr{font-size:13px;color:var(--pv);font-weight:700}
.vcard .es{font-size:13px;color:var(--muted)}
.xp{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 14px}
.xp .it{flex:1 1 220px;border:2px solid var(--border);border-radius:14px;padding:12px 14px;background:var(--soft)}
.xp .it .h{font-weight:800}
.xp .it .h .em{margin-right:6px}
.xp .it .s{font-size:14px;color:var(--muted);font-style:italic}

/* ---------- QUESTION BLOCKS ---------- */
.qset{margin:10px 0}
.qhead{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--brand);margin:18px 0 10px}
.qhead .n{background:var(--idbg);border-radius:999px;padding:3px 11px;font-size:13px}
.q{border:2px solid var(--border);border-radius:16px;padding:16px 18px;margin:0 0 12px;background:var(--card)}
.q .qt{font-size:17px;font-weight:700;margin:0 0 10px}
.q .qt .num{color:var(--brand);margin-right:6px}
.opts{display:grid;gap:9px}
.opt{font:inherit;font-size:16px;text-align:left;padding:12px 15px;border:2px solid var(--border);border-radius:12px;
  background:var(--card);color:var(--ink);cursor:pointer;transition:.14s}
.opt:hover{border-color:var(--brand);transform:translateX(3px)}
.opt.ok{border-color:var(--green);background:rgba(34,197,94,.13)}
.opt.no{border-color:var(--red);background:rgba(239,68,68,.13)}
.opt:disabled{cursor:default;opacity:.85}
.tf{display:flex;gap:10px}
.tf .opt{flex:1;text-align:center;font-weight:800}
.fb{font-size:15px;font-weight:700;margin-top:8px;min-height:20px}
.fb.good{color:var(--green)}
.fb.bad{color:var(--red)}
.open textarea{font:inherit;width:100%;min-height:64px;padding:11px 13px;border:2px solid var(--border);border-radius:12px;background:var(--soft);color:var(--ink);resize:vertical}
.reveal{margin-top:9px}
.reveal button{font:inherit;font-weight:700;font-size:14px;color:var(--brand);background:var(--idbg);border:0;border-radius:999px;padding:7px 14px;cursor:pointer}
.reveal button:hover{filter:brightness(.96)}
.sample{display:none;margin-top:9px;font-size:15px;background:var(--soft);border-left:4px solid var(--brand);border-radius:8px;padding:10px 13px}
.sample.show{display:block}
.sample b{color:var(--brand)}

/* ---------- MODEL STORY / SPEAK ---------- */
.model{background:linear-gradient(135deg,var(--idbg),var(--pvbg));border:2px dashed var(--brand2);border-radius:18px;padding:18px 20px;margin:14px 0}
.model .lab{font-size:13px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--brand2);margin-bottom:6px}
.model p{margin:0;font-size:17.5px;line-height:1.7}
.speak{background:var(--soft);border:2px solid var(--border);border-radius:16px;padding:16px 18px;margin:12px 0}
.speak .ttl{font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.speak ul{margin:6px 0 0;padding-left:22px}
.speak li{margin:5px 0}
.finalq{background:var(--idbg);border-radius:14px;padding:13px 16px;font-weight:700;margin-top:12px}
.finalq .l{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--brand);display:block;margin-bottom:3px}

/* ---------- GAMES ---------- */
.gcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin:0 0 22px;border:1px solid var(--border)}
.gcard .gtag{display:inline-block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));padding:5px 12px;border-radius:999px;margin-bottom:8px}
.ginfo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 14px}
.ginfo .b{background:var(--soft);border-radius:12px;padding:11px 14px;font-size:14.5px}
.ginfo .b b{display:block;color:var(--brand);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.gscore{font-weight:800;color:var(--brand)}
.gboard{margin-top:8px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cards .mc{aspect-ratio:1;border-radius:14px;border:2px solid var(--border);background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:15px;cursor:pointer;text-align:center;padding:6px;transition:.2s;transform-style:preserve-3d}
.cards .mc.flip{background:var(--card);color:var(--ink);border-color:var(--brand)}
.cards .mc.done{background:rgba(34,197,94,.16);color:var(--ink);border-color:var(--green);cursor:default}
.pool{display:flex;flex-wrap:wrap;gap:9px;margin:8px 0}
.token{border:2px solid var(--border);border-radius:999px;padding:9px 15px;font-weight:700;background:var(--soft);cursor:grab;font-size:15px}
.token.used{opacity:.35;cursor:default}
.drops{display:grid;gap:9px;margin:8px 0}
.drop{display:flex;align-items:center;gap:10px;border:2px dashed var(--border);border-radius:12px;padding:10px 13px;min-height:50px;background:var(--card)}
.drop .lab{flex:1;font-size:15.5px}
.drop .slot{min-width:120px;min-height:34px;border-radius:999px;border:2px dashed var(--brand);display:grid;place-items:center;font-weight:700;color:var(--muted);font-size:14px;padding:4px 10px}
.drop.ok{border-color:var(--green);background:rgba(34,197,94,.10)}
.drop.ok .slot{border-style:solid;border-color:var(--green);color:var(--ink)}
.ginput{font:inherit;font-size:16px;padding:11px 14px;border:2px solid var(--border);border-radius:12px;background:var(--soft);color:var(--ink);width:200px;max-width:60%}
.gbtn{font:inherit;font-weight:800;font-size:15px;padding:11px 20px;border-radius:999px;border:0;cursor:pointer;
  background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 5px 14px rgba(91,91,246,.4);transition:.15s}
.gbtn:hover{transform:translateY(-2px)}
.gbtn.ghost{background:var(--soft);color:var(--ink);box-shadow:none;border:2px solid var(--border)}
.gridhunt{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:8px 0}
.gridhunt .cell{aspect-ratio:1;border-radius:10px;border:2px solid var(--border);background:var(--soft);display:grid;place-items:center;font-size:22px;cursor:pointer;transition:.15s}
.gridhunt .cell:hover{border-color:var(--brand)}
.gridhunt .cell.hit{background:rgba(34,197,94,.18);border-color:var(--green)}
.gridhunt .cell.miss{background:rgba(239,68,68,.14);border-color:var(--red)}
.spinwrap{text-align:center;margin:10px 0}
.spinner{font-size:30px;font-weight:800;min-height:46px;display:grid;place-items:center;background:var(--soft);border-radius:14px;padding:14px;margin-bottom:10px}
.builder{display:grid;gap:9px;margin:8px 0}
.bstep{display:flex;gap:9px;align-items:center}
.bstep .num{width:30px;height:30px;border-radius:999px;background:var(--idbg);color:var(--brand);font-weight:800;display:grid;place-items:center;flex:0 0 auto}
.bsent{flex:1;border:2px solid var(--border);border-radius:12px;padding:10px 13px;font-size:15.5px;background:var(--card);cursor:pointer}
.bsent.sel{border-color:var(--brand2);background:var(--idbg)}
.bsent.ok{border-color:var(--green);background:rgba(34,197,94,.1)}

/* ---------- BUTTONS / NAV ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;align-items:center;gap:12px;
  padding:12px;background:rgba(20,22,52,.94);backdrop-filter:blur(8px)}
.btn{font:inherit;font-weight:800;font-size:16px;padding:12px 26px;border-radius:999px;border:0;cursor:pointer;transition:.15s}
.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;box-shadow:0 6px 16px rgba(91,91,246,.45)}
.btn.ghost{background:rgba(255,255,255,.14);color:#fff}
.btn:disabled{opacity:.4;cursor:default}
.btn:hover:not(:disabled){transform:translateY(-2px)}
.navinfo{color:#fff;font-weight:700;font-size:14px;opacity:.85}

.unitnavwrap{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}
.upill{cursor:pointer;border:2px solid var(--border);background:var(--card);color:var(--ink);font:inherit;font-weight:800;font-size:14px;border-radius:12px;padding:8px 13px;transition:.15s}
.upill:hover{transform:translateY(-2px)}
.upill.on{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent}

.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(30px);opacity:0;z-index:80;
  background:var(--ink);color:var(--card);font-weight:800;padding:12px 22px;border-radius:999px;box-shadow:var(--shadow);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:680px){
  .ginfo,.cards{grid-template-columns:1fr 1fr}
  .gridhunt{grid-template-columns:repeat(4,1fr)}
  h1{font-size:27px}h2{font-size:23px}
  .slide,.gcard{padding:20px}
  .tabs{top:52px}
}
</style>
</head>
<body>

<div class="top">
  <div class="logo"><span class="mk">👯</span> Meeting with an Old Friend</div>
  <div class="sp"></div>
  <div class="hud">⭐ <span id="xp">0</span> XP</div>
  <div class="hud gold">🏆 <span id="done">0</span></div>
  <button class="tg" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
  <div class="bar"><i id="progbar"></i></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="wrap" id="wrap"></div>

<div class="nav">
  <button class="btn ghost" onclick="prevTab()">◀ Back</button>
  <span class="navinfo" id="navinfo"></span>
  <button class="btn primary" onclick="nextTab()">Next ▶</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CORE VOCABULARY (Semana 24 — Meeting with an Old Friend)
   ============================================================ */
const VOCAB=[
 {w:"Friends",pr:"frends",es:"Amigos",em:"👫"},
 {w:"Buddy",pr:"bá-di",es:"Compañero",em:"🤝"},
 {w:"Classmate",pr:"klás-meit",es:"Compañero de clase",em:"🎒"},
 {w:"Meet",pr:"miit",es:"Encontrarse",em:"🙋"},
 {w:"Laugh",pr:"laf",es:"Reír",em:"😂"},
 {w:"Hug",pr:"jag",es:"Abrazar",em:"🤗"},
 {w:"Talk",pr:"tok",es:"Hablar",em:"💬"},
 {w:"Greet",pr:"griit",es:"Saludar",em:"👋"},
 {w:"Walk",pr:"uók",es:"Caminar",em:"🚶"},
 {w:"Play",pr:"plái",es:"Jugar",em:"⚽"},
 {w:"Happy",pr:"já-pi",es:"Feliz",em:"😄"},
 {w:"Surprised",pr:"ser-práizd",es:"Sorprendido",em:"😲"},
 {w:"Smile",pr:"smáil",es:"Sonrisa",em:"🙂"},
 {w:"Excited",pr:"ek-sái-tid",es:"Emocionado",em:"🤩"},
 {w:"Relaxed",pr:"ri-lákst",es:"Relajado",em:"😌"},
 {w:"Park",pr:"park",es:"Parque",em:"🌳"},
 {w:"School",pr:"skúul",es:"Escuela",em:"🏫"},
 {w:"Home",pr:"jóum",es:"Casa",em:"🏠"},
 {w:"Coffee shop",pr:"kó-fi shop",es:"Cafetería",em:"☕"},
 {w:"Mall",pr:"mol",es:"Centro comercial",em:"🛍️"},
 {w:"Memories",pr:"mé-mo-ris",es:"Recuerdos",em:"💭"},
 {w:"Childhood",pr:"cháild-jud",es:"Infancia",em:"🧸"},
 {w:"Trip",pr:"trip",es:"Viaje",em:"🧳"},
 {w:"Reunion",pr:"ri-iú-nion",es:"Reunión",em:"🎉"},
 {w:"Gift",pr:"gift",es:"Regalo",em:"🎁"}
];

/* ============================================================
   UNITS — 10 storytellings, each with idioms/PV in order,
   4–6 Ghibli scenes, model story, and 4 question sets.
   Characters: Lucas & Sofía (childhood friends) appear across
   all units for continuity.
   ============================================================ */
const UNITS=[];
/* unit-blocks: story = array of {p:"text"} or {img:{prompt,q,em,lbl}} */

const CHARS="Lucas (a young man with short dark hair, a green jacket and kind eyes) and Sofía (a young woman with curly brown hair, a yellow scarf and a bright smile)";

UNITS.push({
 n:1, title:"Long Time No See", theme:"Meeting an old friend on the street",
 idioms:[{en:"Long time no see",es:"Cuánto tiempo sin verte"},{en:"A blast from the past",es:"Algo o alguien del pasado que reaparece"}],
 pvs:[{en:"Catch up",es:"Ponerse al día"},{en:"Run into",es:"Encontrarse por casualidad"}],
 story:[
  {p:`On a sunny Saturday morning, Lucas walked slowly through the busy city center. He needed a <b>gift</b> for his sister, so he went from shop to shop with a small <b>smile</b> on his face.`},
  {img:{em:"🏙️",lbl:"Unit 1 · Scene 1",prompt:`Studio-Ghibli style: ${CHARS}. Here we only see Lucas, a young man with short dark hair and a green jacket, walking through a sunny, busy city center with small shopping bags. Soft watercolor light, warm colors, gentle morning glow, hand-painted clouds.`,q:"What is Lucas doing? How does he feel? Where is he?"}},
  {p:`Suddenly, near a small <b>coffee shop</b>, he saw a woman with curly hair and a familiar <b>laugh</b>. His heart jumped. It was Sofía, his old <b>classmate</b> from primary school!`},
  {img:{em:"☕",lbl:"Unit 1 · Scene 2",prompt:`Studio-Ghibli style: Lucas (green jacket, short dark hair) stops and stares, surprised, near a cosy coffee shop with warm yellow windows. In front of him, Sofía, a young woman with curly brown hair and a yellow scarf, is laughing. Magical, nostalgic atmosphere, soft light.`,q:"Who does Lucas see? What is her name? How do you think Lucas feels — happy or sad?"}},
  {p:`"Sofía? Is that really you? <id>Long time no see</id>!" Lucas said, very <b>surprised</b>. Sofía turned around and her eyes opened wide. "Lucas! I can't believe it!" she answered, and gave him a warm <b>hug</b>.`},
  {img:{em:"🤗",lbl:"Unit 1 · Scene 3",prompt:`Studio-Ghibli style: ${CHARS} share a warm, friendly hug in the middle of the street. Both have big happy smiles. People walk softly in the background. Emotional reunion, golden afternoon light, tender mood.`,q:"What are the two friends doing? Why are they hugging?"}},
  {p:`For a moment, both friends felt like children again. Seeing Sofía was <id>a blast from the past</id> for Lucas. He remembered their old <b>school</b>, their games in the <b>park</b>, and their happy <b>childhood</b> days together.`},
  {img:{em:"🌳",lbl:"Unit 1 · Scene 4",prompt:`Studio-Ghibli style memory/flashback: the same two characters but as small children — little Lucas and little Sofía — playing happily in a green park with tall trees, a swing and falling leaves. Dreamy, faded, nostalgic colors like an old photograph.`,q:"What does Lucas remember? When were these memories from?"}},
  {p:`"We have so many things to tell each other," Sofía said. "Let's sit down and <pv>catch up</pv> over a hot coffee." Lucas was very <b>excited</b> and said yes at once. While they walked to a table, Sofía smiled. "It is so strange to <pv>run into</pv> you here today, after ten years!" "Strange and wonderful," Lucas said. That morning, two old friends started a new chapter of their long friendship.`},

/* ============================================================
   STATE + HELPERS
   ============================================================ */
let XP=0, DONE=0, answered={};
const $=(s,el=document)=>el.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1500);}
function addXP(n){XP+=n;$("#xp").textContent=XP;}
function markDone(id){if(answered[id])return false;answered[id]=1;DONE++;$("#done").textContent=DONE;updateProgress();return true;}
function updateProgress(){const total=window.__TOTAL__||1;$("#progbar").style.width=Math.min(100,Math.round(DONE/total*100))+"%";}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute("data-theme")==="dark";
  h.setAttribute("data-theme",dark?"light":"dark");
  $("#themeBtn").textContent=dark?"🌙 Dark":"☀️ Light";
}

/* ---------- render a Ghibli scene frame ---------- */
function sceneHTML(img,unitN,idx){
  return `<figure class="scene" style="margin:18px 0">
    <div class="art">
      <span class="lbl">${img.lbl||('Unit '+unitN+' · Scene '+idx)}</span>
      <span class="em">${img.em||"🎨"}</span>
      <span class="ghb">🎬 Studio-Ghibli style</span>
    </div>
    <figcaption class="meta">
      <p class="prm"><b>Image prompt:</b> ${esc(img.prompt)}</p>
      <p class="obs">${esc(img.q)}</p>
    </figcaption>
  </figure>`;
}

/* ---------- render question sets ---------- */
function mcHTML(id,arr){
  return arr.map((q,i)=>{
    const opts=q.opts.map((o,j)=>`<button class="opt" onclick="pickMC(this,${j===q.a},'${id}_${i}')">${esc(o)}</button>`).join("");
    return `<div class="q"><p class="qt"><span class="num">${i+1}.</span>${esc(q.q)}</p>
      <div class="opts">${opts}</div><div class="fb" id="fb_${id}_${i}"></div></div>`;
  }).join("");
}
function pickMC(btn,correct,id){
  const box=btn.closest(".q");if(box.dataset.done)return;
  box.dataset.done=1;
  [...box.querySelectorAll(".opt")].forEach(o=>o.disabled=true);
  const fb=box.querySelector(".fb");
  if(correct){btn.classList.add("ok");fb.textContent="✅ Correct!";fb.className="fb good";addXP(10);}
  else{btn.classList.add("no");box.querySelectorAll(".opt").forEach(o=>{if(o.textContent && o.getAttribute("onclick").includes("true"))o.classList.add("ok");});
    fb.textContent="❌ Not quite — the correct answer is highlighted.";fb.className="fb bad";addXP(2);}
  if(markDone(id))toast(correct?"+10 XP":"+2 XP");
}
function tfHTML(id,arr){
  return arr.map((q,i)=>`<div class="q"><p class="qt"><span class="num">${i+1}.</span>${esc(q.q)}</p>
    <div class="tf">
      <button class="opt" onclick="pickTF(this,${q.a===true},'${id}_${i}')">✔ True</button>
      <button class="opt" onclick="pickTF(this,${q.a===false},'${id}_${i}')">✘ False</button>
    </div><div class="fb" id="fb_${id}_${i}"></div></div>`).join("");
}
function pickTF(btn,correct,id){
  const box=btn.closest(".q");if(box.dataset.done)return;box.dataset.done=1;
  [...box.querySelectorAll(".opt")].forEach(o=>o.disabled=true);
  const fb=box.querySelector(".fb");
  if(correct){btn.classList.add("ok");fb.textContent="✅ Correct!";fb.className="fb good";addXP(10);}
  else{btn.classList.add("no");fb.textContent="❌ Read the story again.";fb.className="fb bad";addXP(2);}
  if(markDone(id))toast(correct?"+10 XP":"+2 XP");
}
function openHTML(id,arr,withSample){
  return arr.map((q,i)=>{
    const obj=typeof q==="string"?{q:q}:q;
    const sample=obj.a?`<div class="reveal"><button onclick="this.nextElementSibling.classList.toggle('show')">💡 Sample answer</button>
      <div class="sample"><b>Sample:</b> ${esc(obj.a)}</div></div>`:"";
    return `<div class="q open"><p class="qt"><span class="num">${i+1}.</span>${esc(obj.q)}</p>
      <textarea placeholder="Write your answer in English..."></textarea>${sample}</div>`;
  }).join("");
}

/* ---------- TABS ENGINE ---------- */
const TABS=[
  {id:"home",label:"🏠 Home"},
  {id:"vocab",label:"📚 Vocabulary"},
  {id:"stories",label:"📖 Stories"},
  {id:"readings",label:"📰 Readings"},
  {id:"games",label:"🎮 Games"},
  {id:"speak",label:"🗣️ Speaking"}
];
let curTab=0;
function buildTabs(){
  const t=$("#tabs");
  TABS.forEach((tb,i)=>{
    const b=ce("button","tab"+(i===0?" on":""),tb.label);
    b.onclick=()=>showTab(i);
    t.appendChild(b);
  });
}
function showTab(i){
  curTab=i;
  [...$("#tabs").children].forEach((c,j)=>c.classList.toggle("on",j===i));
  [...document.querySelectorAll(".view")].forEach((v,j)=>v.classList.toggle("on",v.id==="view-"+TABS[i].id));
  $("#navinfo").textContent=`${TABS[i].label.replace(/^[^ ]+ /,"")} · ${i+1}/${TABS.length}`;
  window.scrollTo({top:0,behavior:"smooth"});
}
function nextTab(){if(curTab<TABS.length-1)showTab(curTab+1);}
function prevTab(){if(curTab>0)showTab(curTab-1);}

     <span class="tag">Comprehension · Reading ${r.n}</span>
     <div class="qhead"><span class="n">A</span> Multiple Choice</div>${mcHTML(id+"mc",r.mc)}
     <div class="qhead"><span class="n">B</span> True / False</div>${tfHTML(id+"tf",r.tf)}
     <div class="qhead"><span class="n">C</span> Open Questions</div>${openHTML(id+"op",r.open)}
   </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderSpeak(){
  const v=ce("div","view");v.id="view-speak";
  const blocks=UNITS.map(u=>`
   <div class="slide">
     <span class="tag">Oral activity · Unit ${u.n}</span>
     <h3>${u.title}</h3>
     <div class="model"><div class="lab">⭐ Model Story (listen / read first)</div><p>${u.model}</p></div>
     <div class="speak"><div class="ttl">🗣️ Your turn — use these expressions</div>
       <ul>
         <li><span class="id">${u.idioms[0].en}</span> · <span class="id">${u.idioms[1].en}</span></li>
         <li><span class="pv">${u.pvs[0].en}</span> · <span class="pv">${u.pvs[1].en}</span></li>
       </ul></div>
     <div class="finalq"><span class="l">Answer & speak</span>${u.finalq.en}<br><span class="muted">${u.finalq.es}</span></div>
   </div>`).join("");
  v.innerHTML=`<div class="slide"><span class="tag">Speaking</span><h2>🗣️ Speaking Tasks</h2>
     <p class="lead">Before each task there is a <b>Model Story</b> — an example of the output you should produce. Use the idioms and phrasal verbs of the unit.</p></div>${blocks}`;

}

/* ============================================================
   GAMES
   ============================================================ */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const IDPV=[];
UNITS.forEach(u=>{u.idioms.forEach(x=>IDPV.push({en:x.en,es:x.es,t:"idiom"}));u.pvs.forEach(x=>IDPV.push({en:x.en,es:x.es,t:"pv"}));});

function gameCard(tag,title,obj,inst,score,bodyId){
  return `<div class="gcard"><span class="gtag">${tag}</span><h3>${title}</h3>
    <div class="ginfo"><div class="b"><b>Objective</b>${obj}</div><div class="b"><b>How to play</b>${inst}</div>
    <div class="b"><b>Scoring</b>${score}</div><div class="b"><b>Your score</b><span class="gscore" id="sc_${bodyId}">0</span></div></div>
    <div class="gboard" id="${bodyId}"></div></div>`;
}
function setScore(id,n){const e=$("#sc_"+id);if(e)e.textContent=n;}

function renderGames(){
  const v=ce("div","view");v.id="view-games";
  v.innerHTML=`<div class="slide"><span class="tag">Play & learn</span><h2>🎮 Vocabulary Games</h2>
    <p class="lead">Ten interactive games with automatic feedback. Earn points and elicit the vocabulary!</p></div>
    ${gameCard("Game 1 · Mystery Image","🔍 Mystery Image","Recognise a word from a blurry picture.","Look at the blurry emoji and choose the correct word. A correct answer makes the image clear.","+10 per correct answer.","g_mystery")}
    ${gameCard("Game 2 · Guess the Word","✏️ Guess the Word","Produce the English word from a clue.","Read the Spanish clue and type the English word. Press Check.","+10 per correct word.","g_guess")}
    ${gameCard("Game 3 · Memory Challenge","🧠 Memory Challenge","Match each word with its picture.","Flip two cards. If the word and the picture match, they stay open.","+10 per pair. Try to finish with few tries!","g_memory")}
    ${gameCard("Game 4 · Hidden Object","🕵️ Hidden Object","Find a target item in the grid.","Find and click ALL the target emojis hidden in the grid. Avoid wrong clicks.","+5 per correct, −2 per mistake.","g_hidden")}
    ${gameCard("Game 5 · Drag & Match","🔗 Drag & Match","Match idioms/phrasal verbs to meanings.","Click a meaning, then click the correct expression to connect them.","+10 per correct match.","g_match")}
    ${gameCard("Game 6 · Story Builder","🧩 Story Builder","Put a short story in the correct order.","Click the sentences in the correct order (1 → 5).","+10 per sentence in the right place.","g_builder")}
    ${gameCard("Game 7 · Picture Detective","🔎 Picture Detective","Understand what happens in a scene.","Look at the scene and choose the best description.","+10 per correct answer.","g_detective")}
    ${gameCard("Game 8 · Vocabulary Race","⏱️ Vocabulary Race","Answer as many words as you can in 30s.","Press Start. Match the word to its meaning quickly before time runs out.","+10 per correct answer in 30 seconds.","g_race")}
    ${gameCard("Game 9 · Spin & Speak","🎡 Spin & Speak","Speak using a random expression.","Press Spin. Use the word/expression you get in a full sentence out loud.","+5 every time you spin and speak.","g_spin")}
    ${gameCard("Game 10 · Who Am I?","❓ Who Am I?","Guess the expression from a riddle.","Read the riddle and choose the correct expression.","+10 per correct answer.","g_whoami")}`;
  setTimeout(initGames,0);
  return v;
}

/* ---- Game 1: Mystery Image ---- */
let G1=0;
function initGames(){
  buildMystery();buildGuess();buildMemory();buildHidden();buildMatch();
  buildBuilder();buildDetective();buildRace();buildSpin();buildWhoAmI();
}
function buildMystery(){
  G1=0;setScore("g_mystery",0);
  const target=VOCAB[Math.floor(Math.random()*VOCAB.length)];
  const opts=shuffle([target,...shuffle(VOCAB.filter(x=>x!==target)).slice(0,3)]);
  $("#g_mystery").innerHTML=`<div class="spinwrap"><div class="spinner" id="myimg" style="filter:blur(9px);font-size:54px">${target.em}</div></div>
    <div class="opts" style="grid-template-columns:1fr 1fr">${opts.map(o=>`<button class="opt" onclick="ansMystery(this,'${o.w==target.w}','${target.w}')">${o.w}</button>`).join("")}</div>
    <div class="fb" id="fb_mystery"></div>`;
}
function ansMystery(btn,ok,word){
  const board=$("#g_mystery");if(board.dataset.d)return;board.dataset.d=1;
  ok=ok==="true";const fb=$("#fb_mystery");
  [...board.querySelectorAll(".opt")].forEach(o=>o.disabled=true);
  if(ok){btn.classList.add("ok");$("#myimg").style.filter="none";fb.textContent="✅ Correct! The word is "+word+".";fb.className="fb good";G1+=10;setScore("g_mystery",G1);addXP(10);}
  else{btn.classList.add("no");$("#myimg").style.filter="none";fb.textContent="❌ It was: "+word+".";fb.className="fb bad";}
  setTimeout(()=>{board.dataset.d="";buildMystery();},1400);
}
/* ---- Game 2: Guess the Word ---- */
let G2=0,g2list=[],g2i=0;
function buildGuess(){
  G2=0;setScore("g_guess",0);g2list=shuffle(VOCAB).slice(0,8);g2i=0;showGuess();
}
function showGuess(){
  if(g2i>=g2list.length){$("#g_guess").innerHTML=`<p class="fb good">🎉 Finished! Final score: ${G2} XP</p><button class="gbtn ghost" onclick="buildGuess()">Play again</button>`;return;}
  const w=g2list[g2i];
  $("#g_guess").innerHTML=`<p>Clue ${g2i+1}/8 — <b>${w.es}</b> ${w.em}</p>
    <input class="ginput" id="gin" placeholder="type the English word" autocomplete="off">
    <button class="gbtn" onclick="ansGuess()">Check</button> <button class="gbtn ghost" onclick="g2i++;showGuess()">Skip</button>
    <div class="fb" id="fb_guess"></div>`;
  setTimeout(()=>{const el=$("#gin");if(el){el.focus();el.onkeydown=e=>{if(e.key==='Enter')ansGuess();};}},30);
}
function ansGuess(){
  const w=g2list[g2i];const val=($("#gin").value||"").trim().toLowerCase();const fb=$("#fb_guess");
  if(val===w.w.toLowerCase()){fb.textContent="✅ Correct!";fb.className="fb good";G2+=10;setScore("g_guess",G2);addXP(10);g2i++;setTimeout(showGuess,800);}
  else{fb.textContent="❌ Try again. (Hint: starts with '"+w.w[0]+"')";fb.className="fb bad";}
}
/* ---- Game 3: Memory ---- */
let G3=0,g3first=null,g3lock=false;
function buildMemory(){
  G3=0;setScore("g_memory",0);g3first=null;g3lock=false;
  const pick=shuffle(VOCAB).slice(0,6);
  let cards=[];pick.forEach(p=>{cards.push({k:p.w,f:p.w,t:"w"});cards.push({k:p.w,f:p.em,t:"e"});});
  cards=shuffle(cards);
  $("#g_memory").innerHTML=`<div class="cards" style="grid-template-columns:repeat(4,1fr)">${cards.map((c,i)=>`<div class="mc" data-k="${c.k}" data-i="${i}" onclick="flipMem(this)"><span style="opacity:0">${c.f}</span></div>`).join("")}</div><div class="fb" id="fb_memory"></div>`;
  // store faces
  [...$("#g_memory").querySelectorAll(".mc")].forEach((el,i)=>{el.dataset.face=cards[i].f;});
}
function flipMem(el){
  if(g3lock||el.classList.contains("flip")||el.classList.contains("done"))return;
  el.classList.add("flip");el.firstChild.style.opacity="1";el.firstChild.textContent=el.dataset.face;
  if(!g3first){g3first=el;return;}
  if(g3first.dataset.k===el.dataset.k){el.classList.add("done");g3first.classList.add("done");g3first=null;G3+=10;setScore("g_memory",G3);addXP(10);
    if([...$("#g_memory").querySelectorAll(".mc")].every(c=>c.classList.contains("done"))){$("#fb_memory").textContent="🎉 All matched! +"+G3+" XP";$("#fb_memory").className="fb good";}
  }else{g3lock=true;const a=g3first,b=el;setTimeout(()=>{[a,b].forEach(x=>{x.classList.remove("flip");x.firstChild.style.opacity="0";});g3first=null;g3lock=false;},800);}
}
/* ---- Game 4: Hidden Object ---- */
let G4=0;
function buildHidden(){
  G4=0;setScore("g_hidden",0);
  const target=VOCAB[Math.floor(Math.random()*VOCAB.length)];
  const fillers=shuffle(VOCAB.filter(x=>x!==target));
  let cells=[];const count=5;
  for(let i=0;i<count;i++)cells.push(target);
  for(let i=0;i<20;i++)cells.push(fillers[i%fillers.length]);
  cells=shuffle(cells);let found=0;
  $("#g_hidden").innerHTML=`<p>Find all <b>${target.w}</b> ${target.em} (there are ${count}).</p>
    <div class="gridhunt">${cells.map((c,i)=>`<div class="cell" data-t="${c===target}" onclick="hitHidden(this)">${c.em}</div>`).join("")}</div>
    <div class="fb" id="fb_hidden"></div>`;
  $("#g_hidden").dataset.left=count;
}
function hitHidden(el){
  if(el.dataset.done)return;el.dataset.done=1;const fb=$("#fb_hidden");
  if(el.dataset.t==="true"){el.classList.add("hit");G4+=5;addXP(5);let left=(+$("#g_hidden").dataset.left)-1;$("#g_hidden").dataset.left=left;
    fb.textContent=left>0?("Good! "+left+" more to find."):"🎉 You found them all!";fb.className="fb good";}
  else{el.classList.add("miss");G4=Math.max(0,G4-2);fb.textContent="❌ That is a different word.";fb.className="fb bad";}
  setScore("g_hidden",G4);
}
/* ---- Game 5: Drag & Match ---- */
let G5=0,g5sel=null;
function buildMatch(){
  G5=0;setScore("g_match",0);g5sel=null;
  const items=shuffle(IDPV).slice(0,5);
  const meanings=shuffle(items);
  $("#g_match").innerHTML=`<p>Click a meaning, then click its expression.</p>
   <p class="muted" style="font-size:13px">Meanings:</p>
   <div class="pool">${meanings.map((m,i)=>`<button class="token" data-en="${m.en}" onclick="selMeaning(this)">${m.es}</button>`).join("")}</div>
   <div class="drops">${items.map(it=>`<div class="drop" data-en="${it.en}"><div class="lab"><span class="${it.t==='idiom'?'id':'pv'}">${it.en}</span></div><div class="slot" onclick="dropMeaning(this)">?</div></div>`).join("")}</div>
   <div class="fb" id="fb_match"></div>`;
}
function selMeaning(b){if(b.classList.contains("used"))return;[...$("#g_match").querySelectorAll(".token")].forEach(t=>t.style.outline="");g5sel=b;b.style.outline="3px solid var(--brand2)";}
function dropMeaning(slot){
  const fb=$("#fb_match");if(!g5sel){fb.textContent="First click a meaning.";fb.className="fb bad";return;}
  const drop=slot.closest(".drop");if(drop.classList.contains("ok"))return;
  if(g5sel.dataset.en===drop.dataset.en){drop.classList.add("ok");slot.textContent=g5sel.textContent;g5sel.classList.add("used");g5sel.style.outline="";g5sel=null;
    G5+=10;setScore("g_match",G5);addXP(10);fb.textContent="✅ Correct match!";fb.className="fb good";}
  else{fb.textContent="❌ Not the right meaning. Try another.";fb.className="fb bad";}
}
/* ---- Game 6: Story Builder ---- */
let G6=0,g6order=[],g6next=0;
function buildBuilder(){
  G6=0;g6next=0;setScore("g_builder",0);
  const story=[
   "I ran into my old friend on the street.",
   "We were very surprised and gave each other a big hug.",
   "We went to a coffee shop to catch up.",
   "We looked at old photos and remembered our childhood.",
   "Before saying goodbye, we promised to keep in touch."
  ];
  g6order=story;const sh=shuffle(story.map((s,i)=>({s,i})));
  $("#g_builder").innerHTML=`<p>Put the story in order (click 1 → 5):</p>
   <div class="builder">${sh.map(o=>`<div class="bstep"><div class="num">•</div><div class="bsent" data-i="${o.i}" onclick="pickBuild(this)">${o.s}</div></div>`).join("")}</div>
   <div class="fb" id="fb_builder"></div>`;
}
function pickBuild(el){
  if(el.classList.contains("ok"))return;const fb=$("#fb_builder");
  if(+el.dataset.i===g6next){el.classList.add("ok");el.previousElementSibling.textContent=g6next+1;g6next++;G6+=10;setScore("g_builder",G6);addXP(10);
    fb.textContent=g6next===5?"🎉 Perfect order! +"+G6+" XP":"✅ Correct! Next sentence...";fb.className="fb good";}
  else{fb.textContent="❌ That is not the next sentence.";fb.className="fb bad";}
}
/* ---- Game 7: Picture Detective ---- */
let G7=0,g7i=0;
const G7DATA=[
 {em:"🤗",q:"Two friends meet after years. What are they doing?",opts:["Fighting","Giving a warm hug","Sleeping","Cooking"],a:1},
 {em:"📷",q:"They are sitting and looking at an old photo. What is happening?",opts:["They remember the past","They are running","They are eating","They are studying"],a:0},
 {em:"☕",q:"Two friends sit with two cups. What are they doing?",opts:["Swimming","Catching up over coffee","Driving","Singing"],a:1},
 {em:"🏕️",q:"Friends with backpacks and a tent. What are they planning?",opts:["A camping trip","A wedding","An exam","A meeting at work"],a:0},
 {em:"📱",q:"Two friends save each other's numbers. Why?",opts:["To keep in touch","To play music","To buy food","To take a photo"],a:0}
];
function buildDetective(){G7=0;g7i=0;setScore("g_detective",0);showDetective();}
function showDetective(){
  if(g7i>=G7DATA.length){$("#g_detective").innerHTML=`<p class="fb good">🎉 Done! Score: ${G7} XP</p><button class="gbtn ghost" onclick="buildDetective()">Play again</button>`;return;}
  const d=G7DATA[g7i];
  $("#g_detective").innerHTML=`<div class="spinwrap"><div class="spinner">${d.em}</div></div><p>${d.q}</p>
   <div class="opts">${d.opts.map((o,j)=>`<button class="opt" onclick="ansDetective(this,${j===d.a})">${o}</button>`).join("")}</div>
   <div class="fb" id="fb_detective"></div>`;
}
function ansDetective(btn,ok){
  const b=$("#g_detective");if(b.dataset.d)return;b.dataset.d=1;
  [...b.querySelectorAll(".opt")].forEach(o=>o.disabled=true);const fb=$("#fb_detective");
  if(ok){btn.classList.add("ok");fb.textContent="✅ Correct!";fb.className="fb good";G7+=10;setScore("g_detective",G7);addXP(10);}
  else{btn.classList.add("no");fb.textContent="❌ Look again!";fb.className="fb bad";}
  setTimeout(()=>{b.dataset.d="";g7i++;showDetective();},1100);
}
/* ---- Game 8: Vocabulary Race ---- */
let G8=0,g8t=null,g8time=30,g8cur=null;
function buildRace(){
  G8=0;g8time=30;setScore("g_race",0);
  $("#g_race").innerHTML=`<p>Match the word to its meaning. You have 30 seconds!</p>
   <button class="gbtn" onclick="startRace()">▶ Start</button> <span id="g8clock" class="gscore"></span>
   <div id="g8area" style="margin-top:10px"></div><div class="fb" id="fb_race"></div>`;
}
function startRace(){
  if(g8t)clearInterval(g8t);G8=0;g8time=30;setScore("g_race",0);
  $("#g8clock").textContent="⏱ 30s";
  g8t=setInterval(()=>{g8time--;$("#g8clock").textContent="⏱ "+g8time+"s";if(g8time<=0){clearInterval(g8t);$("#g8area").innerHTML="";$("#fb_race").textContent="⏰ Time! Final score: "+G8+" XP";$("#fb_race").className="fb good";}},1000);
  raceRound();
}
function raceRound(){
  if(g8time<=0)return;
  g8cur=VOCAB[Math.floor(Math.random()*VOCAB.length)];
  const opts=shuffle([g8cur,...shuffle(VOCAB.filter(x=>x!==g8cur)).slice(0,3)]);
  $("#g8area").innerHTML=`<p><b>${g8cur.w}</b> ${g8cur.em}</p><div class="opts" style="grid-template-columns:1fr 1fr">${opts.map(o=>`<button class="opt" onclick="ansRace('${o.es===g8cur.es}')">${o.es}</button>`).join("")}</div>`;
}
function ansRace(ok){
  if(g8time<=0)return;const fb=$("#fb_race");
  if(ok==="true"){G8+=10;setScore("g_race",G8);addXP(10);fb.textContent="✅";fb.className="fb good";}
  else{fb.textContent="❌";fb.className="fb bad";}
  raceRound();
}
/* ---- Game 9: Spin & Speak ---- */
let G9=0;
const G9DATA=[...VOCAB.map(v=>v.w),...IDPV.map(x=>x.en)];
function buildSpin(){
  G9=0;setScore("g_spin",0);
  $("#g_spin").innerHTML=`<div class="spinwrap"><div class="spinner" id="g9out">🎡 Press Spin!</div>
   <button class="gbtn" onclick="doSpin()">🎡 Spin</button></div>
   <p class="muted">Make a full sentence out loud with the word or expression you get.</p><div class="fb" id="fb_spin"></div>`;
}
function doSpin(){
  const out=$("#g9out");let n=0;const iv=setInterval(()=>{out.textContent=G9DATA[Math.floor(Math.random()*G9DATA.length)];n++;
    if(n>14){clearInterval(iv);G9+=5;setScore("g_spin",G9);addXP(5);$("#fb_spin").textContent="🗣️ Now say a sentence with it!";$("#fb_spin").className="fb good";}},80);
}
/* ---- Game 10: Who Am I? ---- */
let G10=0,g10i=0;
const G10DATA=[
 {clue:"I am an idiom. I mean 'we have not seen each other for a long time'.",a:"Long time no see",opts:["Long time no see","My treat","Time flies","Pack up"]},
 {clue:"I am a phrasal verb. I mean 'to meet someone by chance'.",a:"Run into",opts:["Set off","Run into","Open up","Grow up"]},
 {clue:"I am an idiom. I mean 'to enjoy yourself very much'.",a:"Have a whale of a time",opts:["Hit it off","Have a whale of a time","Drop by","Count on"]},
 {clue:"I am a phrasal verb. I mean 'to stay in contact with someone'.",a:"Keep in touch",opts:["Keep in touch","Look through","Hang out","Set up"]},
 {clue:"I am an idiom. I mean 'two people who are always together'.",a:"Joined at the hip",opts:["Out of the blue","The good old days","Joined at the hip","My treat"]},
 {clue:"I am a phrasal verb. I mean 'to share your feelings honestly'.",a:"Open up",opts:["Open up","Pack up","Bring back","Bump into"]},
 {clue:"I am an idiom. I mean 'a real friend helps you in difficult times'.",a:"A friend in need is a friend indeed",opts:["A friend in need is a friend indeed","Time flies","Get along","Catch up"]},
 {clue:"I am a phrasal verb. I mean 'to depend on / trust someone'.",a:"Count on",opts:["Fill in","Count on","Take back","Drop by"]}
];
function buildWhoAmI(){G10=0;g10i=0;setScore("g_whoami",0);showWho();}
function showWho(){
  if(g10i>=G10DATA.length){$("#g_whoami").innerHTML=`<p class="fb good">🎉 Done! Score: ${G10} XP</p><button class="gbtn ghost" onclick="buildWhoAmI()">Play again</button>`;return;}
  const d=G10DATA[g10i];const opts=shuffle(d.opts);
  $("#g_whoami").innerHTML=`<p>❓ ${d.clue}</p><div class="opts">${opts.map(o=>`<button class="opt" onclick="ansWho(this,'${o===d.a}')">${o}</button>`).join("")}</div><div class="fb" id="fb_whoami"></div>`;
}
function ansWho(btn,ok){
  const b=$("#g_whoami");if(b.dataset.d)return;b.dataset.d=1;
  [...b.querySelectorAll(".opt")].forEach(o=>o.disabled=true);const fb=$("#fb_whoami");
  if(ok==="true"){btn.classList.add("ok");fb.textContent="✅ Correct!";fb.className="fb good";G10+=10;setScore("g_whoami",G10);addXP(10);}
  else{btn.classList.add("no");fb.textContent="❌ Read the clue again!";fb.className="fb bad";}
  setTimeout(()=>{b.dataset.d="";g10i++;showWho();},1100);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  window.__TOTAL__=UNITS.reduce((s,u)=>s+u.mc.length+u.tf.length,0)+READINGS.reduce((s,r)=>s+r.mc.length+r.tf.length,0);
  buildTabs();
  const wrap=$("#wrap");
  wrap.appendChild(renderHome());
  wrap.appendChild(renderVocab());
  wrap.appendChild(renderStories());
  wrap.appendChild(renderReadings());
  wrap.appendChild(renderGames());
  wrap.appendChild(renderSpeak());
  showTab(0);
  updateProgress();
}
init();
